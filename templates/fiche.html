<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche de Renseignement Complète - Hôtel Le Prestige</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .section-title { background: #2c3e50; color: white; padding: 8px 15px; border-radius: 5px; margin: 20px 0 15px 0; font-size: 14px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 12px; color: #555; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn-valider { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .alert { padding: 15px; text-align: center; border-radius: 5px; margin-bottom: 20px; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #2c3e50; margin-top: 0;">📋 FICHE DE RENSEIGNEMENT CLIENT</h2>

    {% if erreur %}<div class="alert alert-error">{{ erreur }}</div>{% endif %}
    {% if success %}<div class="alert alert-success">✅ Enregistrement effectué avec succès !</div>{% endif %}

    <form action="{{ url_for('fiche') }}" method="POST" id="policeForm">
        
        <div class="section-title">1. État Civil & Identité</div>
        <div class="grid">
            <div class="form-group"><label>Nom</label><input type="text" name="nom" required style="text-transform: uppercase;"></div>
            <div class="form-group"><label>Prénom(s)</label><input type="text" name="prenom" required></div>
            <div class="form-group"><label>Nationalité</label><input type="text" name="nationalite" required></div>
            
            <div class="form-group"><label>Date de Naissance</label><input type="date" name="date_naissance"></div>
            <div class="form-group"><label>Lieu de Naissance</label><input type="text" name="lieu_naissance"></div>
            <div class="form-group"><label>Situation Familiale</label>
                <select name="situation_familiale">
                    <option>Célibataire</option>
                    <option>Marié(e)</option>
                    <option>Veuf/Veuve</option>
                </select>
            </div>
            
            <div class="form-group"><label>Profession</label><input type="text" name="profession"></div>
            <div class="form-group"><label>Téléphone</label><input type="text" name="telephone" required></div>
        </div>

        <div class="section-title">2. Domicile & Itinéraire</div>
        <div class="grid">
            <div class="form-group" style="grid-column: span 2;"><label>Domicile Habituel (Ville/Pays)</label><input type="text" name="domicile_habituel"></div>
            <div class="form-group"><label>Provenance</label><input type="text" name="provenance"></div>
            <div class="form-group"><label>Destination</label><input type="text" name="destination"></div>
            <div class="form-group"><label>Mode de Transport</label><input type="text" name="mode_transport" placeholder="Avion, Bus, Auto..."></div>
            <div class="form-group"><label>N° Immatriculation (si auto)</label><input type="text" name="immatriculation"></div>
        </div>

        <div class="section-title">3. Pièce d'Identité</div>
        <div class="grid">
            <div class="form-group"><label>Type de pièce</label>
                <select name="type_piece">
                    <option>CNI</option>
                    <option>Passeport</option>
                    <option>Permis</option>
                    <option>Autre</option>
                </select>
            </div>
            <div class="form-group"><label>Numéro de la pièce</label><input type="text" name="num_piece" required></div>
            <div class="form-group"><label>Date de délivrance</label><input type="date" name="date_delivrance"></div>
            <div class="form-group" style="grid-column: span 3;"><label>Lieu de délivrance</label><input type="text" name="lieu_delivrance"></div>
        </div>

        <div class="section-title">4. Séjour à l'Hôtel</div>
        <div class="grid">
            <div class="form-group"><label>N° Chambre</label>
                <select name="chambre_num">
                    {% for i in range(1,10) %}
                    <option value="{{ '%02d'|format(i) }}">Chambre {{ '%02d'|format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Date Arrivée</label><input type="date" name="date_arrivee" id="arr" required></div>
            <div class="form-group"><label>Date Départ Prévue</label><input type="date" name="date_depart" id="dep" required></div>
        </div>

        <button type="submit" class="btn-valider">💾 ENREGISTRER LA FICHE CLIENT</button>
    </form>
    
    <a href="{{ url_for('dashboard') }}" style="display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none;">⬅ Annuler et Retour</a>
</div>

<script>
    document.getElementById('policeForm').onsubmit = function(e) {
        var d1 = new Date(document.getElementById('arr').value);
        var d2 = new Date(document.getElementById('dep').value);
        if (d2 <= d1) {
            alert("ERREUR : La date de départ doit être strictement supérieure à la date d'arrivée.");
            e.preventDefault();
        }
    };
</script>

</body>
</html>
